services:
  mongo:
    image: mongo:7
    container_name: url-shortener-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: url-shortener-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: url-shortener-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/url-shortener
      REDIS_URL: redis://redis:6379
      BASE_URL: http://localhost:5000
      CORS_ORIGIN: http://localhost:4173,http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: url-shortener-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:5000
    ports:
      - "4173:4173"
    depends_on:
      - backend

volumes:
  mongo_data:
